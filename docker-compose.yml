services:
  spy-employee:
    build: .
    container_name: spy-options-employee
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    # Phase 2: Scale to s-2vcpu-4gb ($24/mo) for backtesting workloads
